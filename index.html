<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF GP</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/a/macros/rabdurand.co.id/s/AKfycbw5bf1vU6KR_nKxXD9V0gGgfdWCoqbzRtE-zezwR0fHMqhWvBFw6_0zS8KTqKIOrnHqzQ/exec"></iframe>

    <script>
        // 1. Mendaftarkan Service Worker wajib PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // 2. Kode Otomatis Memicu Pop-Up Install Resmi Android/Chrome
        window.addEventListener('beforeinstallprompt', (e) => {
            // Mencegah Chrome menunda banner
            e.preventDefault();
            
            // Langsung eksekusi memunculkan pop-up install bawaan saat itu juga
            e.prompt(); 
            
            e.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User menginstall MF GP');
                }
            });
        });
    </script>
</body>
</html>
